minimal_mono:
  name: "Minimal Mono"
  description: "A clean monospace journal theme"
  custom_css: |
    /* Minimal Mono – 12px monospace journal */

    .blog { font-size: 0.75rem; line-height: 1.25rem; }
    h1, h2, h3, h4, h5, h6 { font-weight: 400; }
    h1, h2, h3, h4, h5, h6,
    .blog-title, .bio, nav,
    h1.post-title, article footer,
    .post-card-date, .post-card-summary, .post-card-title,
    .tag-link, .tag-filter-notice, .tag-filter-notice-links, .tag-filter-notice-link,
    .email-subscriber-form, figcaption, .lexxy-content figcaption { font-size: 0.75rem; }

    /* Header */
    .avatar, header hr, .post-card-badge { display: none; }
    nav { justify-content: flex-start; }
    .bio { text-align: left; }

    /* Cards */
    .post-card-content {
      border: none; box-shadow: none; border-radius: 0;
      padding: 0; background: transparent;
      display: flex; flex-direction: column;
    }
    .post-card:hover .post-card-content { box-shadow: none; transform: none; }
    .post-card-meta { order: -1; margin: 0; }
    .post-card-meta.has-tags, .post-card-meta.no-tags { margin-top: 0; }
    .post-card-date { opacity: 1; }
    .post-card-title {
      color: var(--color-text); letter-spacing: 0; margin-bottom: 0;
      text-decoration: underline dotted var(--color-text-muted);
      text-underline-offset: 0.125em;
    }
    .post-card:hover .post-card-title { text-decoration-color: var(--color-text); }
    .post-card-summary { margin-bottom: 0; }

    /* Post */
    article.post { display: flex; flex-direction: column; }
    article.post footer { display: contents; }
    article.post .post-date { order: -1; }
    article.post .post-actions { margin-top: 1rem; margin-bottom: 1rem; }
    h1.post-title { line-height: inherit; margin-bottom: 0.5rem; }
    .tags-container { margin-top: 0.5rem; }
    .email-form-container { gap: 0.25rem; }
    .form-container { padding: 0; }

    /* Heading markers */
    .lexxy-content h1::before,
    .lexxy-content h2::before,
    .lexxy-content h3::before,
    .lexxy-content h4::before { color: var(--color-text-muted); font-weight: inherit; }
    .lexxy-content h1::before { content: "# "; }
    .lexxy-content h2::before { content: "## "; }
    .lexxy-content h3::before { content: "### "; }
    .lexxy-content h4::before { content: "#### "; }

    /* Content */
    article img { border-radius: 0; }

    /* Links */
    .bio a, .lexxy-content a {
      text-decoration: underline dotted var(--color-text-muted);
      text-underline-offset: 0.125em;
    }
    .bio a:hover, .lexxy-content a:hover { text-decoration-color: var(--color-text); }
  font: "mono"
  width: "narrow"
  layout: 0
  theme: "base"
  position: 1
  active: true

archibald:
  name: "Archibald"
  description: "A refined monospace theme with accent-underlined links and reordered header"
  custom_css: |
    /* Archibald – refined monospace with accent links */

    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@100;200;300;400;500;600;700;800;900&display=swap');
    body { font-family: "Roboto Mono", monospace; }

    /* Header: reorder to title, nav, bio */
    header { display: flex; flex-direction: column; }
    header > .titlebar { order: 1; }
    header > nav { order: 2; justify-content: flex-start; margin-bottom: 1.75em; gap: 1rem; }
    header > .bio { order: 3; }
    header > .email-subscriber-form { order: 4; }
    header > hr { order: 5; }

    /* Links: accent underline, highlight on hover */
    nav a, .lexxy-content a, .posts-titles a, .posts-list a, .subscription-message a {
      color: var(--lexxy-color-ink);
      border-bottom: 3px solid var(--color-accent);
      text-decoration: none;
      font-weight: normal;
    }
    nav a:hover, .lexxy-content a:hover, .posts-titles a:hover, .posts-list a:hover, .subscription-message a:hover {
      background-color: var(--color-accent);
      color: var(--color-bg);
      text-decoration: none;
    }

    /* Dotted borders */
    header hr, footer.blog-footer { border-top: 3px dotted var(--color-text); }

    /* Post lists */
    .posts-list a { width: fit-content; }

    /* Spacing */
    article, .email-subscriber-form { margin-bottom: 2em; }
  theme: "mint"
  font: "mono"
  width: "standard"
  layout: 1
  position: 2
  active: true

hestia:
  name: "Hestia"
  description: "A warm, card-style theme with stone tones and dusty rose accents"
  custom_css: |
    .post-title a { font-weight: 700; }
    main a { font-weight: 500; }
    .bio { margin-top: -.5rem; }
    ul { margin-left: .25rem; }
    ol { margin-left: .5rem; }

    hr {
      border: 1px solid var(--color-text-light);
      opacity: .1;
    }

    blockquote {
      color: var(--color-text);
      opacity: .7;
    }

    article img {
      width: 100%;
      height: auto;
      max-block-size: none;
    }

    .attachment-gallery {
      margin-inline: -10px;
    }

    .attachment-gallery img {
      aspect-ratio: 1/1;
      object-fit: cover;
    }

    .tag-filter-notice {
      margin-top: 1rem;
      margin-bottom: 2.5rem;
    }

    .post.h-entry {
      padding: 25px 25px 1px 25px;
      background-color: var(--color-bg-subtle);
      border-radius: 0.5rem;
      margin-top: 1rem;
      margin-bottom: 0;
    }

    .post.h-entry:not(:has(.post-title)) {
      padding-top: 8px;
    }

    article img:not(figure img, .attachment-gallery *),
    .attachment:not(.attachment-gallery *) {
      padding-top: 8px;
    }

    .tag.tag-link {
      background: var(--color-bg-elevated);
      color: var(--color-text-muted);
    }

    .tag.tag-link:hover { color: var(--color-text); }

    .post .blog-footer { margin-top: 4em; }
    .page .blog-footer { margin-top: 2em; }
  theme: "custom"
  font: "sans"
  width: "narrow"
  layout: 0
  position: 3
  active: true
  custom_theme_bg_light: "#faf8f5"
  custom_theme_bg_dark: "#1a1816"
  custom_theme_text_light: "#3a342e"
  custom_theme_text_dark: "#d4cfc8"
  custom_theme_accent_light: "#b5546a"
  custom_theme_accent_dark: "#d4748a"
