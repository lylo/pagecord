---
cardashian:
  name: Cardashian
  description: A vivid card gallery with accent borders and modern sans typography
  custom_css: |
    /* Cardashian – vivid card gallery */

    @import url('https://fonts.bunny.net/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
    body { font-family: "Outfit", sans-serif; }

    /* Header: avatar + title grouped left */
    .avatar {
      width: 3.5rem;
      height: 3.5rem;
    }
    .avatar img {
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 0.375rem;
      border: 2px solid var(--color-accent);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--color-accent) 20%, transparent);
    }
    .avatar-container { align-items: center; gap: 0.75rem; justify-content: flex-start; }
    .blog-title a { font-weight: 700; letter-spacing: -0.02em; }
    .bio { text-align: left; margin-top: 1rem; margin-bottom: 1rem; }

    nav {
      justify-content: flex-start;
      gap: 0.5rem;
    }
    nav a {
      font-weight: 500;
      font-size: 0.95em;
      background: var(--color-bg-subtle);
      padding: 0.25em 0.75em;
      border-radius: 9999px;
      color: var(--color-text-muted);
    }
    nav a:hover {
      background: var(--color-accent);
      color: var(--color-bg);
    }

    header hr {
      border: none;
      height: 2px;
      background: linear-gradient(to right, var(--color-accent), transparent);
      margin: 1.5rem 0;
    }

    /* Cards – accent left border */
    .post-card-content {
      border: none;
      border-left: 3px solid var(--color-accent);
      border-radius: 0 0.5rem 0.5rem 0;
      background: var(--color-bg-subtle);
    }

    .post-card:hover .post-card-content {
      box-shadow: 0 8px 24px -4px color-mix(in oklch, var(--color-accent) 20%, transparent);
      transform: translateY(-2px);
      border-left-width: 4px;
    }

    .post-card-title {
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .post-card-badge {
      background: var(--color-accent);
      color: var(--color-bg);
      font-weight: 600;
      font-size: 0.7em;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-color: transparent;
    }

    .post-card-date { font-variant-numeric: tabular-nums; }

    .post-card-summary img { border-radius: 0.375rem; }

    /* Single post */
    h1.post-title {
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .post-title a { text-decoration: none; }

    /* Links */
    .lexxy-content a {
      font-weight: 500;
      text-decoration-color: var(--color-accent-muted);
      text-underline-offset: 0.15em;
    }
    .lexxy-content a:hover { text-decoration-color: var(--color-accent); }

    /* Images */
    article img { border-radius: 0.375rem; }

    /* Tags */
    .tag-link { font-weight: 500; }
  theme: custom
  font: sans
  width: standard
  layout: cards_layout
  custom_theme_bg_light: "#f9f8f6"
  custom_theme_text_light: "#1a1718"
  custom_theme_accent_light: "#7c3aed"
  custom_theme_bg_dark: "#1a1718"
  custom_theme_text_dark: "#e8e6e3"
  custom_theme_accent_dark: "#a78bfa"
  position: 0
  active: true
broadside:
  name: Broadside
  description: Bold poster-style typography with oversized year headers and strong
    accents
  custom_css: |
    /* Broadside – poster-style editorial */

    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
    body { font-family: "Space Grotesk", sans-serif; }

    /* Header: title left, avatar right */
    .titlebar { margin-top: 2rem; margin-bottom: 0.5rem; }
    .avatar-container { flex-direction: row-reverse; align-items: center; }
    .avatar img { border-radius: 0.25rem; }
    .blog-title {
      font-size: 2.5em;
      line-height: 1;
    }
    .blog-title a { font-weight: 700; letter-spacing: -0.04em; }

    nav {
      justify-content: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.25rem;
    }
    nav a {
      text-transform: uppercase;
      font-size: 0.85em;
      letter-spacing: 0.08em;
      font-weight: 500;
      padding: 0.2em 0;
      border-bottom: 2px solid transparent;
    }
    nav a:hover { border-bottom-color: var(--color-accent); }

    .bio { text-align: left; margin-top: 0.75rem; }

    header hr {
      border: none;
      height: 3px;
      background: var(--color-text);
      margin: 1.25rem 0;
    }

    /* Year headers – the signature element */
    .year-header {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--color-accent);
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .year-header.has-previous { margin-top: 2.5rem; }

    /* Post rows */
    .post-row {
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--color-border);
    }
    .post-row a {
      font-weight: 500;
      text-decoration: none;
    }
    .post-row a:hover { color: var(--color-accent); }
    .post-row time { font-variant-numeric: tabular-nums; }

    /* Single post */
    h1.post-title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    .post-title a { text-decoration: none; }

    /* Links */
    .lexxy-content a { font-weight: 500; }

    /* Tags */
    .tag-link {
      text-transform: uppercase;
      font-size: 0.65em;
      letter-spacing: 0.08em;
      font-weight: 600;
      color: var(--color-accent);
    }
  theme: custom
  font: sans
  width: standard
  layout: title_layout
  custom_theme_bg_light: "#efebed"
  custom_theme_text_light: "#2d0a5e"
  custom_theme_accent_light: "#f03124"
  custom_theme_bg_dark: "#150830"
  custom_theme_text_dark: "#ede8ee"
  custom_theme_accent_dark: "#ff4535"
  position: 1
  active: true
archibald:
  name: Archibald
  description: A refined monospace theme with accent-underlined links and reordered
    header
  custom_css: |
    /* Archibald – refined monospace with accent links */

    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@100;200;300;400;500;600;700;800;900&display=swap');
    body { font-family: "Roboto Mono", monospace; }

    /* Header: reorder to title, nav, bio */
    header { display: flex; flex-direction: column; }
    header > .titlebar { order: 1; }
    header > nav { order: 2; justify-content: flex-start; margin-bottom: 1.75em; gap: 1rem; }
    header > .bio { order: 3; }
    header > .email-subscriber-form { order: 4; }
    header > hr { order: 5; }

    /* Links: accent underline, highlight on hover */
    nav a, .lexxy-content a, .posts-titles a, .posts-list a, .subscription-message a {
      color: var(--lexxy-color-ink);
      border-bottom: 3px solid var(--color-accent);
      text-decoration: none;
      font-weight: normal;
    }
    nav a:hover, .lexxy-content a:hover, .posts-titles a:hover, .posts-list a:hover, .subscription-message a:hover {
      background-color: var(--color-accent);
      color: var(--color-bg);
      text-decoration: none;
    }

    /* Dotted borders */
    header hr, footer.blog-footer { border-top: 3px dotted var(--color-text); }

    /* Post lists */
    .posts-list a { width: fit-content; }

    /* Spacing */
    article, .email-subscriber-form { margin-bottom: 2em; }
  theme: mint
  font: mono
  width: standard
  layout: title_layout
  position: 2
  active: true
hestia:
  name: Hestia
  description: A warm, card-style theme with stone tones and dusty rose accents
  custom_css: |
    .post-title a { font-weight: 700; }
    main a { font-weight: 500; }
    .bio { margin-top: -.5rem; }
    ul { margin-left: .25rem; }
    ol { margin-left: .5rem; }

    hr {
      border: 1px solid var(--color-text-light);
      opacity: .1;
    }

    blockquote {
      color: var(--color-text);
      opacity: .7;
    }

    article img {
      width: 100%;
      height: auto;
      max-block-size: none;
    }

    .attachment-gallery {
      margin-inline: -10px;
    }

    .attachment-gallery img {
      aspect-ratio: 1/1;
      object-fit: cover;
    }

    .tag-filter-notice {
      margin-top: 1rem;
      margin-bottom: 2.5rem;
    }

    .post.h-entry {
      padding: 25px 25px 1px 25px;
      background-color: var(--color-bg-subtle);
      border-radius: 0.5rem;
      margin-top: 1rem;
      margin-bottom: 0;
    }

    .post.h-entry:not(:has(.post-title)) {
      padding-top: 8px;
    }

    article img:not(figure img, .attachment-gallery *),
    .attachment:not(.attachment-gallery *) {
      padding-top: 8px;
    }

    .tag.tag-link {
      background: var(--color-bg-elevated);
      color: var(--color-text-muted);
    }

    .tag.tag-link:hover { color: var(--color-text); }

    .post .blog-footer { margin-top: 4em; }
    .page .blog-footer { margin-top: 2em; }
  theme: custom
  font: sans
  width: narrow
  layout: stream_layout
  custom_theme_bg_light: "#faf8f5"
  custom_theme_text_light: "#3a342e"
  custom_theme_accent_light: "#b5546a"
  custom_theme_bg_dark: "#1a1816"
  custom_theme_text_dark: "#d4cfc8"
  custom_theme_accent_dark: "#d4748a"
  position: 3
  active: true
novella:
  name: Novella
  description: A literary editorial theme with golden accents and drop caps
  custom_css: |
    /* Novella – literary editorial */

    @import url('https://fonts.bunny.net/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,300;1,6..72,400&display=swap');
    body { font-family: "Newsreader", serif; }
    :root { --font-size-base: 110%; }

    /* Header: centered masthead */
    header { display: flex; flex-direction: column; align-items: center; }
    header > .titlebar { order: 1; }
    header > .bio { order: 2; }
    header > nav { order: 3; }
    header > .email-subscriber-form { order: 4; margin-top: 1.25rem; }
    header > hr { order: 5; width: 100%; }

    .titlebar { justify-content: center; }
    .avatar-container {
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.75rem;
    }
    .avatar img { border-radius: 0.5rem; }
    .blog-title {
      font-family: var(--font-sans), sans-serif;
      font-size: 0.95em;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }
    .blog-title a { font-weight: 600; }
    .bio { text-align: center; font-style: italic; opacity: 0.8; margin-top: 0.5rem; }
    nav { justify-content: center; gap: 1.25rem; font-size: 0.9em; }
    nav a { font-weight: 400; }

    /* Divider */
    header hr {
      border: none;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--color-border), transparent);
      margin: 1.75rem 0;
    }

    /* Stream posts */
    .post-stream-item {
      padding-bottom: 2rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--color-border);
    }
    .post-stream-item:last-of-type { border-bottom: none; }

    h1.post-title { font-weight: 500; letter-spacing: -0.02em; }
    .post-title a { text-decoration: none; }

    /* Drop cap on first paragraph of posts (not bio) */
    @supports (initial-letter: 2) or (-webkit-initial-letter: 2) {
      article.post .e-content > p:first-child::first-letter {
        -webkit-initial-letter: 2;
        initial-letter: 2;
        margin-right: 0.35em;
        font-weight: 600;
        color: var(--color-accent);
      }
    }

    /* Links */
    .lexxy-content a {
      text-decoration-color: var(--color-accent-muted);
      text-underline-offset: 0.15em;
    }
    .lexxy-content a:hover { text-decoration-color: var(--color-accent); }

    /* Images */
    article img { border-radius: 0.25rem; }

    /* Post footer */
    article footer { font-style: italic; }
  theme: custom
  font: serif
  width: narrow
  layout: stream_layout
  custom_theme_bg_light: "#f0f4f1"
  custom_theme_text_light: "#1a2e22"
  custom_theme_accent_light: "#b8860b"
  custom_theme_bg_dark: "#141f18"
  custom_theme_text_dark: "#d0d8d2"
  custom_theme_accent_dark: "#d4a840"
  position: 4
  active: true
