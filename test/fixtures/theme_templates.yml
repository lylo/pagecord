mozake:
  name: Mozake
  description: A stripped-back theme inspired by the earliest web pages
  custom_css: |
    /* Mozake – plain HTML, circa 1991 */

    body { font-family: "Times New Roman", Times, serif; }
    .lexxy-content { --lexxy-content-margin: 0.75rem; }

    /* Header */
    header { margin-bottom: 1rem; }
    .avatar { display: none; }
    .titlebar { display: block; }
    .blog-title { font-size: revert; font-weight: revert; }
    .bio { font: revert; color: revert; }
    nav { justify-content: flex-start; font-size: 1em; }

    /* Links */
    a, .posts-titles a, .post-title-link,
    .empty-state a, .tag-filter-notice-link {
      color: revert;
      text-decoration: revert;
      font-weight: revert;
    }

    /* Typography */
    article { line-height: revert; }
    .lexxy-content h1, .lexxy-content h2, .lexxy-content h3,
    .lexxy-content h4, .lexxy-content h5, .lexxy-content h6 {
      font-size: revert; font-weight: revert; line-height: revert;
      margin-block: revert;
    }
    h1.post-title { font-size: revert; font-weight: bold; line-height: revert; margin-bottom: 1rem; }
    hr { border: revert; margin-block: 1em; }

    /* Post footer */
    article footer { display: block; font-size: revert; }
    .icon { width: 1em; height: 1em; }

    /* Title layout */
    .year-header { font-size: revert; font-weight: bold; }
    .post-row time { color: revert; }

    /* Tags */
    .tag-link {
      background: none; padding: 0; border-radius: 0;
      font-size: revert; color: revert;
    }
    .tag-link::before { content: "#"; }

    /* Images */
    article img, .post-card-summary img { border-radius: 0; }

    /* Code */
    .lexxy-content pre { background: transparent; border-radius: 0; }
    .lexxy-content code { background: transparent; }

    /* Post cards */
    .post-card-content {
      border: none; box-shadow: none; border-radius: 0;
      padding: 0; background: transparent;
    }
    .post-card:hover .post-card-content { box-shadow: none; transform: none; }
    .post-card-link { color: revert; text-decoration: none; }
    .post-card-title { font-size: revert; font-weight: revert; line-height: revert; text-decoration: underline; color: inherit; }
    .post-card-badge { display: none; }
    .post-card-date { opacity: 1; font-size: revert; color: var(--color-text); }
    .post-card-summary { color: var(--color-text); }

    /* Stream layout */
    .post-stream-item { margin-bottom: 2em; }

    /* Forms – old-school browser defaults */
    .form { padding: 0; background: transparent; border-radius: 0; }
    .form-container { padding: 0; }
    .contact-form, .reply-form { max-width: 80ch; margin-inline: auto; }

    .blog input[type="text"],
    .blog input[type="email"],
    .blog textarea {
      border: revert;
      border-radius: 0;
      background: revert;
      padding: revert;
    }

    .blog input[type="submit"] {
      all: revert;
      font-family: inherit;
      cursor: pointer;
    }

    /* Email form */
    .email-subscriber-form {
      margin: 0; font: revert;
      display: block;
    }
    .email-form-container { display: block; text-align: revert; }
    .email-form-container fieldset { margin: 0.5em 0; padding: 0; }

    /* Footer – text link instead of logo */
    footer.blog-footer {
      margin-top: 2em; padding: 0; display: block;
    }
    footer.blog-footer #brand svg { display: none; }
    footer.blog-footer #brand::after { content: "Pagecord"; margin-bottom: 1em; display: block; }

    /* Misc */
    .tag-filter-notice { background: transparent; border: none; border-radius: 0; padding: 0; font-size: revert; color: revert; }
    .tag-filter-notice-link { font-size: revert; }
  theme: custom
  font: serif
  width: standard
  layout: stream_layout
  custom_theme_bg_light: "#ffffff"
  custom_theme_text_light: "#000000"
  custom_theme_accent_light: "#0000EE"
  custom_theme_bg_dark: "#ffffff"
  custom_theme_text_dark: "#000000"
  custom_theme_accent_dark: "#0000EE"
  position: 6
  active: true
minimal_mono:
  name: Minimal Mono
  description: A clean monospace journal theme
  custom_css: |
    /* Minimal Mono – 12px monospace journal */

    .blog { font-size: 0.75rem; line-height: 1.25rem; }
    h1, h2, h3, h4, h5, h6 { font-weight: 400; }
    h1, h2, h3, h4, h5, h6,
    .blog-title, .bio, nav,
    h1.post-title, article footer,
    .post-card-date, .post-card-summary, .post-card-title,
    .tag-link, .tag-filter-notice, .tag-filter-notice-links, .tag-filter-notice-link,
    .email-subscriber-form, figcaption, .lexxy-content figcaption { font-size: 0.75rem; }

    /* Header */
    .avatar, header hr, .post-card-badge { display: none; }
    nav { justify-content: flex-start; }
    .bio { text-align: left; }

    /* Cards */
    .post-card-content {
      border: none; box-shadow: none; border-radius: 0;
      padding: 0; background: transparent;
      display: flex; flex-direction: column;
    }
    .post-card:hover .post-card-content { box-shadow: none; transform: none; }
    .post-card-meta { order: -1; margin: 0; }
    .post-card-meta.has-tags, .post-card-meta.no-tags { margin-top: 0; }
    .post-card-date { opacity: 1; }
    .post-card-title {
      color: var(--color-text); letter-spacing: 0; margin-bottom: 0;
      text-decoration: underline dotted var(--color-text-muted);
      text-underline-offset: 0.125em;
    }
    .post-card:hover .post-card-title { text-decoration-color: var(--color-text); }
    .post-card-summary { margin-bottom: 0; }

    /* Post */
    article.post { display: flex; flex-direction: column; }
    article.post footer { display: contents; }
    article.post .post-date { order: -1; }
    article.post .post-actions { margin-top: 1rem; margin-bottom: 1rem; }
    h1.post-title { line-height: inherit; margin-bottom: 0.5rem; }
    .tags-container { margin-top: 0.5rem; }
    .email-form-container { gap: 0.25rem; }
    .form-container { padding: 0; }

    /* Heading markers */
    .lexxy-content h1::before,
    .lexxy-content h2::before,
    .lexxy-content h3::before,
    .lexxy-content h4::before { color: var(--color-text-muted); font-weight: inherit; }
    .lexxy-content h1::before { content: "# "; }
    .lexxy-content h2::before { content: "## "; }
    .lexxy-content h3::before { content: "### "; }
    .lexxy-content h4::before { content: "#### "; }

    /* Content */
    article img { border-radius: 0; }

    /* Links */
    .bio a, .lexxy-content a {
      text-decoration: underline dotted var(--color-text-muted);
      text-underline-offset: 0.125em;
    }
    .bio a:hover, .lexxy-content a:hover { text-decoration-color: var(--color-text); }
  theme: base
  font: mono
  width: narrow
  layout: stream_layout
  position: 7
  active: true
