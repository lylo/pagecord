minimal_mono:
  name: Minimal Mono
  description: A clean monospace journal theme
  custom_css: |
    /* Minimal Mono – 12px monospace journal */

    .blog { font-size: 0.75rem; line-height: 1.25rem; }
    h1, h2, h3, h4, h5, h6 { font-weight: 400; }
    h1, h2, h3, h4, h5, h6,
    .blog-title, .bio, nav,
    h1.post-title, article footer,
    .post-card-date, .post-card-summary, .post-card-title,
    .tag-link, .tag-filter-notice, .tag-filter-notice-links, .tag-filter-notice-link,
    .email-subscriber-form, figcaption, .post-body figcaption { font-size: 0.75rem; }

    /* Header */
    .avatar, header hr, .post-card-badge { display: none; }
    nav { justify-content: flex-start; }
    .bio { text-align: left; }

    /* Cards */
    .post-card-content {
      border: none; box-shadow: none; border-radius: 0;
      padding: 0; background: transparent;
      display: flex; flex-direction: column;
    }
    .post-card:hover .post-card-content { box-shadow: none; transform: none; }
    .post-card-meta { order: -1; margin: 0; }
    .post-card-meta.has-tags, .post-card-meta.no-tags { margin-top: 0; }
    .post-card-date { opacity: 1; }
    .post-card-title {
      color: var(--color-text); letter-spacing: 0; margin-bottom: 0;
      text-decoration: underline dotted var(--color-text-muted);
      text-underline-offset: 0.125em;
    }
    .post-card:hover .post-card-title { text-decoration-color: var(--color-text); }
    .post-card-summary { margin-bottom: 0; }

    /* Post */
    article.post { display: flex; flex-direction: column; }
    article.post footer { display: contents; }
    article.post .post-date { order: -1; }
    article.post .post-actions { margin-top: 1rem; margin-bottom: 1rem; }
    h1.post-title { line-height: inherit; margin-bottom: 0.5rem; }
    .tags-container { margin-top: 0.5rem; }
    .email-form-container { gap: 0.25rem; }
    .form-container { padding: 0; }

    /* Heading markers */
    .post-body h1::before,
    .post-body h2::before,
    .post-body h3::before,
    .post-body h4::before { color: var(--color-text-muted); font-weight: inherit; }
    .post-body h1::before { content: "# "; }
    .post-body h2::before { content: "## "; }
    .post-body h3::before { content: "### "; }
    .post-body h4::before { content: "#### "; }

    /* Content */
    article img { border-radius: 0; }

    /* Links */
    .bio a, .post-body a {
      text-decoration: underline dotted var(--color-text-muted);
      text-underline-offset: 0.125em;
    }
    .bio a:hover, .post-body a:hover { text-decoration-color: var(--color-text); }
  theme: base
  font: mono
  width: narrow
  layout: stream_layout
  position: 10
  active: true
pukka:
  name: Pukka
  description: A clean, roomy theme with a square avatar beside stacked title and
    nav, in a generous system-font type
  custom_css: |
    /* Pukka – a clean, roomy default */

    /* System font at an 18px base, in a 700px column */
    :root {
      --font-size-base: 112.5%;
      --content-width-wide: 43.75rem;
    }
    .blog {
      font-family: "SF Pro Display", -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
    }

    /* Header: square avatar left, title and nav stacked beside it */
    header {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      margin-top: 2rem;
      margin-bottom: 3rem;
    }

    .titlebar,
    .avatar-container {
      display: contents;
    }

    /* margin-right (not column-gap) so title and nav sit flush
       left when there is no avatar */
    .avatar {
      grid-column: 1;
      grid-row: 1 / span 2;
      margin-right: 1rem;
    }
    .avatar img { border-radius: 0.5rem; }

    .blog-title {
      grid-column: 2;
      grid-row: 1;
      font-size: 1.5em;
    }

    header nav {
      grid-column: 2;
      grid-row: 2;
      justify-content: flex-start;
      gap: 1rem;
      font-size: 1em;
      margin-top: 0.5rem;
    }
    header nav a {
      color: var(--color-accent);
      text-decoration: underline;
    }
    header nav a:hover { color: var(--color-accent-hover); }

    .bio,
    .email-subscriber-form,
    header hr {
      grid-column: 1 / -1;
    }

    header hr {
      margin-top: 2rem;
    }

    /* Bio reads like body text */
    .bio {
      font-size: 1em;
      line-height: 1.5;
      color: var(--color-text);
    }

    /* Title list: light, underlined links */
    .posts-titles a {
      font-weight: 400;
      text-decoration: underline;
    }

    /* Stream layout: a divider between every post */
    .stream_layout .post-stream-item {
      border-top: 1px solid var(--color-border);
      padding-top: 3rem;
      margin-bottom: 3rem;
    }
    .stream_layout > turbo-frame > .h-feed > .post-stream-item:first-child {
      border-top: none;
      padding-top: 0;
    }

    /* Links throughout sit at a normal weight */
    .bio a,
    .post-body a { font-weight: 400; }

    /* Tags read like body text; card "read more" matches */
    .tag-link,
    .post-card-badge {
      font-weight: 400;
      color: var(--color-text);
    }

    /* Headings sit at a lighter weight */
    h1.post-title { font-weight: 700; }
  theme: custom
  font: sans
  width: wide
  layout: title_layout
  custom_theme_bg_light: "#eef2f9"
  custom_theme_text_light: "#1e1e1e"
  custom_theme_accent_light: "#2563eb"
  custom_theme_bg_dark: "#14171f"
  custom_theme_text_dark: "#d7d7d7"
  custom_theme_accent_dark: "#60a5fa"
  position: 5
  active: true
aurelia:
  name: Aurelia
  description: A soft dusk-gradient theme with a display serif and an airy grotesque
    body
  custom_css: |
    /* Aurelia – soft dusk gradient, editorial display serif */

    @import url('https://fonts.bunny.net/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&display=swap');
    @import url('https://fonts.bunny.net/css2?family=Bricolage+Grotesque:wght@300;400;500;700&display=swap');

    :root {
      --font-text: "Bricolage Grotesque", sans-serif;
      --font-header: "Fraunces", serif;
    }

    /* Base type and a fixed dusk gradient behind the content */
    body {
      font-family: var(--font-text);
      font-weight: 300;
      background-image:
        radial-gradient(75% 75% at 28% 72%, #F0A57F33 0%, transparent 68%),
        radial-gradient(72% 72% at 76% 58%, #DE7FA62B 0%, transparent 60%),
        radial-gradient(75% 75% at 50% 20%, #8E9BE026 0%, transparent 55%);
      background-attachment: fixed;
    }

    /* Let the gradient show through the blog container */
    .blog { background: transparent; }

    /* Headings in the display serif */
    h1, h2, h3, h4, h5, h6,
    h1.post-title, .blog-title {
      font-family: var(--font-header);
      font-weight: 400;
    }
    h1.post-title { letter-spacing: -0.01em; }

    /* Header: title right, then nav, then bio */
    header { display: flex; flex-direction: column; }
    header > .titlebar { order: 1; }
    header > nav { order: 2; }
    header > .bio { order: 3; color: var(--color-text); }
    header > .email-subscriber-form { order: 4; }
    header hr { display: none; }

    .titlebar { justify-content: flex-end; }
    .blog-title {
      font-size: 2em;
      text-align: right;
    }
    nav { gap: 1rem; }

    /* Divider under the header, index page only */
    .blog:not(.post, .page, .home-page) header {
      border-bottom: 1px solid color-mix(in srgb, var(--color-accent) 30%, transparent);
      padding-bottom: 1.5rem;
    }

    /* Title list: align the date column */
    .post-row time { font-variant-numeric: tabular-nums; }

    /* Links: accent underline, soft highlight on hover */
    a {
      color: var(--color-text);
      text-decoration: underline;
      text-decoration-color: var(--color-accent);
      text-decoration-thickness: 0.1em;
      text-underline-offset: 0.22em;
    }
    a:hover {
      background-color: color-mix(in srgb, var(--color-accent) 18%, transparent);
    }

    .blog-title a,
    .post-title a,
    .posts-titles a {
      color: var(--color-text);
      text-decoration: none;
    }
    .blog-title a:hover,
    .post-title a:hover,
    .posts-titles a:hover {
      color: var(--color-accent);
      background-color: transparent;
    }

    footer a { text-decoration: none; }
    footer a:hover {
      color: var(--color-accent);
      fill: var(--color-accent);
      background-color: transparent;
    }

    /* Tags: plain #hashtag text */
    .tag-link {
      background: transparent;
      padding: 0;
      color: var(--color-text);
      font-size: 0.85em;
      font-weight: 400;
    }
    .tag-link::before { content: "#"; color: var(--color-text-muted); }
    .tag-link:hover,
    .tag-link:hover::before {
      color: var(--color-accent);
      background-color: transparent;
    }

    /* Forms (subscription, contact, reply) and tag filter notice:
       soft accent fill, no border */
    .form,
    .tag-filter-notice {
      background-color: color-mix(in srgb, var(--color-accent) 10%, transparent);
      border: none;
    }
    .email-subscriber-form input[type="email"] { border: none; }

    /* Text selection */
    ::selection {
      background-color: color-mix(in srgb, var(--color-accent) 20%, transparent);
    }
  theme: custom
  font: sans
  width: standard
  layout: title_layout
  custom_theme_bg_light: "#fbf7f1"
  custom_theme_text_light: "#2b2724"
  custom_theme_accent_light: "#c05b4d"
  custom_theme_bg_dark: "#1a1613"
  custom_theme_text_dark: "#e7dfd5"
  custom_theme_accent_dark: "#e39385"
  position: 1
  active: true
